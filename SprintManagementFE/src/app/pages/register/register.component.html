<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[#141e30] to-[#243b55]">

  <!-- Registration Card -->
  <div class="w-[400px] p-8 rounded-xl 
              bg-white/10 backdrop-blur-lg 
              shadow-2xl border border-white/20 
              text-white text-center">

    <!-- Logo -->
    
    <div class="flex-col flex items-center mb-4">
       
      <img [src]="logo" alt="ScrumFlow Logo" class="h-12 w-12 mb-0"> 
        <span 
        class="text-white font-thin text-xs font-serif text-[10px] tracking-wider"
      >ScrumFlow</span> 
    </div>


    <h2 class="text-2xl font-semibold mb-1">Register</h2>
    <p class="text-sm text-gray-300 mb-5">
      Create your account to manage sprints efficiently
    </p>

    <!-- Form -->
    <form (ngSubmit)="register()" class="space-y-4">

      <!-- Name -->
      <input
        type="text"
        [(ngModel)]="name"
        name="name"
        placeholder="Full Name"
        required
        class="w-full px-4 py-3 rounded-lg 
               bg-white/20 text-white placeholder-gray-300
               outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Email -->
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
        class="w-full px-4 py-3 rounded-lg 
               bg-white/20 text-white placeholder-gray-300
               outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Password -->
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Password"
        required
        class="w-full px-4 py-3 rounded-lg 
               bg-white/20 text-white placeholder-gray-300
               outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Confirm Password -->
      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm Password"
        required
        class="w-full px-4 py-3 rounded-lg 
               bg-white/20 text-white placeholder-gray-300
               outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Register Button -->
      <button
        type="submit"
        class="w-full py-3 rounded-lg 
               bg-gradient-to-r from-cyan-400 to-blue-600
               hover:scale-105 transition duration-300
               shadow-lg font-medium"
      >
        Register
      </button>

    </form>

    <!-- Footer -->
    <div class="mt-4 text-sm text-gray-300">
      Already have an account? 
      <a routerLink="/login" class="text-cyan-400 hover:underline">
        Login
      </a>
    </div>

  </div>

</div>
