


<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[#141e30] to-[#243b55]">

  <!-- Login Card -->
  <div class="w-[350px] p-8 rounded-xl bg-white/10 backdrop-blur-lg shadow-2xl border border-white/20 text-white text-center">

    <!-- Logo & App Name -->
 <div class="flex-col flex items-center mb-4">
       
      <img [src]="logo" alt="ScrumFlow Logo" class="h-12 w-12 mb-0"> 
        <span 
        class="text-white font-thin text-xs font-serif text-[10px] tracking-wider"
      >ScrumFlow</span> 
    </div>

    
    <!-- Title -->
    <h2 class="text-2xl font-semibold mb-1">Login</h2>
    <p class="text-sm text-gray-300 mb-5">Manage your sprints efficiently</p>

    <!-- Form -->
    <form (ngSubmit)="login()" class="space-y-4">

      <!-- Email Input -->
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Enter Email"
        autocomplete="email"
        required
        class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Password Input -->
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter Password"
        autocomplete="current-password"
        required
        class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 outline-none focus:ring-2 focus:ring-cyan-400"
      />

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full py-3 rounded-lg bg-gradient-to-r from-cyan-400 to-blue-600 hover:scale-105 transition duration-300 shadow-lg font-medium"
      >
        Login
      </button>

    </form>

    <!-- Footer -->
    <div class="mt-4 text-sm text-gray-300">
      Don’t have an account? 
      <a routerLink="/register" class="text-cyan-400 hover:underline">Register</a>
    </div>

  </div>
</div>
