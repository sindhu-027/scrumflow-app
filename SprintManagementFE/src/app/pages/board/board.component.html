








<div class="min-h-screen bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center shadow">

    <div class="flex items-center gap-2">
      <img src="assets/ScrumLogo.png" class="h-10 w-10">
      <span class="text-lg font-bold text-cyan-400">ScrumFlow</span>
    </div>

    <div class="flex gap-6 text-sm font-medium">
      <a routerLink="/dashboard" class="hover:text-cyan-400">Dashboard</a>
      <a routerLink="/board" class="text-cyan-400 font-semibold">Board</a>
    </div>

  </nav>

  <!-- CONTENT -->
  <div class="max-w-7xl mx-auto py-8 px-4">

    <h1 class="text-3xl font-bold mb-6 text-gray-800">Sprint Board</h1>

    <!-- TOP CONTROLS -->
    <div class="mb-6 flex flex-wrap items-center gap-6 bg-white p-4 rounded-xl shadow">

      <!-- Sprint -->
      <div class="flex items-center gap-3">
        <label class="font-medium">Sprint:</label>

        <select
          [(ngModel)]="selectedSprintId"
          (change)="loadTasks(selectedSprintId)"
          class="border px-4 py-2 rounded">

          <option value="0" disabled>Select sprint</option>

          <option *ngFor="let sprint of sprints" [ngValue]="sprint.id">
            {{ sprint.name }}
          </option>

        </select>
      </div>

      <!-- Priority Filter -->
      <div class="flex items-center gap-3">
        <label class="font-medium">Priority:</label>

        <select
          [(ngModel)]="selectedPriority"
          (change)="applyFilter()"
          class="border px-4 py-2 rounded">

          <option value="All">All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>

        </select>
      </div>

    </div>

    <!-- LOADING -->
    <div *ngIf="isLoading" class="text-center text-gray-500">
      Loading...
    </div>

    <!-- BOARD -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6"
         *ngIf="!isLoading && selectedSprintId">

      <ng-container *ngFor="let column of [
        { title: 'To Do', data: todo, id: 'todoList', connect: ['inProgressList','doneList'], status: 'To Do' },
        { title: 'In Progress', data: inProgress, id: 'inProgressList', connect: ['todoList','doneList'], status: 'In Progress' },
        { title: 'Done', data: done, id: 'doneList', connect: ['todoList','inProgressList'], status: 'Completed' }
      ]">

        <!-- COLUMN -->
        <div class="bg-white rounded-xl shadow p-4">

          <h2 class="font-semibold mb-3 flex justify-between">
            {{ column.title }}
            <span class="text-sm text-gray-400">{{ column.data.length }}</span>
          </h2>

          <!-- DROP AREA -->
          <div
            cdkDropList
            [id]="column.id"
            [cdkDropListData]="column.data"
            [cdkDropListConnectedTo]="column.connect"
            (cdkDropListDropped)="drop($event, column.title)"
            class="min-h-[300px] space-y-3 bg-gray-50 p-2 rounded">

            <div *ngIf="column.data.length === 0"
                 class="text-gray-400 text-sm text-center">
              No tasks
            </div>

            <!-- TASK CARD -->
            <div *ngFor="let task of column.data"
                 cdkDrag
                 [cdkDragDisabled]="role !== 'Developer'"
                 class="p-3 rounded-lg border shadow-sm transition hover:shadow-md"

                 [ngClass]="{
                   'bg-blue-50 border-blue-300': task.status === 'To Do',
                   'bg-yellow-50 border-yellow-300': task.status === 'In Progress',
                   'bg-green-50 border-green-300': task.status === 'Completed'
                 }">

              <!-- TITLE -->
              <h3 class="font-semibold text-sm">
                {{ task.title }}
              </h3>

              <!-- DESCRIPTION -->
              <p class="text-xs text-gray-600 mt-1">
                {{ task.description || 'No description' }}
              </p>

              <!-- FOOTER -->
              <div class="flex justify-between mt-3 text-xs">

                <!-- PRIORITY -->
                <span class="px-2 py-1 rounded font-medium"
                  [ngClass]="{
                    'bg-red-200 text-red-800': task.priority === 'High',
                    'bg-yellow-200 text-yellow-800': task.priority === 'Medium',
                    'bg-green-200 text-green-800': task.priority === 'Low'
                  }">
                  {{ task.priority }}
                </span>

                <!-- STORY POINTS -->
                <span class="text-gray-400">
                  points {{ task.storyPoints }} 
                </span>

              </div>

            </div>

          </div>

        </div>

      </ng-container>

    </div>

  </div>
</div>
