




<!-- NAVBAR -->
<nav class="bg-gray-900 text-white px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <img [src]="logo" alt="ScrumFlow Logo" class="h-10 w-10">
    <span class="text-white text-lg font-semibold">ScrumFlow</span>
  </div>
  <div class="flex gap-4">
    <a routerLink="/dashboard" class="hover:text-cyan-400">Dashboard</a>
    <a routerLink="/backlog" class="hover:text-cyan-400">Backlog</a>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="max-w-lg mx-auto p-6 bg-white/90 backdrop-blur-sm shadow-lg rounded-xl mt-6 text-gray-800">

  <h1 class="text-2xl font-bold mb-6">Edit Task</h1>

  <form (ngSubmit)="updateTask()" class="space-y-4">

    <!-- Title -->
    <div>
      <label class="block mb-1 font-medium">Title</label>
      <input type="text" [(ngModel)]="task.title" name="title" required
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"/>
      <div *ngIf="!task.title" class="text-red-500 text-sm mt-1">Title is required</div>
    </div>

    <!-- Description -->
    <div>
      <label class="block mb-1 font-medium">Description</label>
      <textarea [(ngModel)]="task.description" name="description" rows="4"
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"></textarea>
      <div *ngIf="!task.description" class="text-red-500 text-sm mt-1">Description is required</div>
    </div>

    <!-- Story Name -->
    <div>
      <label class="block mb-1 font-medium">Story Name</label>
      <input type="text" [(ngModel)]="task.storyName" name="storyName" required
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"/>
      <div *ngIf="!task.storyName" class="text-red-500 text-sm mt-1">Story Name is required</div>
    </div>

    <!-- Story Points -->
    <div>
      <label class="block mb-1 font-medium">Story Points</label>
      <input type="number" [(ngModel)]="task.storyPoints" name="storyPoints" required min="1" max="20"
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"/>
      <div *ngIf="!task.storyPoints" class="text-red-500 text-sm mt-1">Story Points are required</div>
    </div>

    <!-- Priority -->
    <div>
      <label class="block mb-1 font-medium">Priority</label>
      <select [(ngModel)]="task.priority" name="priority" required
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400">
        <option value="" disabled>Select Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>

    <!-- Status -->
    <div>
      <label class="block mb-1 font-medium">Status</label>
      <select [(ngModel)]="task.status" name="status" required
        class="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400">
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">completed</option>
      </select>
    </div>

    <!-- Update Button -->
    <button type="submit"
      class="w-full py-3 mt-2 bg-gradient-to-r from-cyan-400 to-blue-600 text-white font-medium rounded-lg shadow hover:scale-105 transition">
      Update Task
    </button>

  </form>
</div>
